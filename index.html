<!DOCTYPE html>
<html lang="es">
<head>
    <!-- La meta etiqueta UTF-8 permite mostrar caracteres especiales correctamente [5, 6] -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje Especial</title>
    <style>
        /* Estilos CSS para el diseño y el texto oculto [7, 8] */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            text-align: center;
        }
        .mensaje-principal {
            font-size: 24px;
            color: #333;
            max-width: 80%;
            line-height: 1.5;
        }
        .secreto {
            /* Definimos un tamaño de fuente extremadamente pequeño para esconderlo [7, 9] */
            font-size: 12px;
            color: #dad9e4.; /* Color igual al fondo para mayor discreción */
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="mensaje-principal">
        <!-- El mensaje principal se coloca dentro de un párrafo [10, 11] -->
        <p>"Lylz wyájapjhtlual pujylíisl, tl kh tbjoízpth clynülugh ohishy jvuapnv, tl khu nhuhz kl nypahysl h avkv ls tbukv xbl tl nbzahz, wlyv al zpluav ahu jlyjh wlyv h sh clg ahu slqvz kl tp"</p>
    </div>

    <!-- Texto oculto muy pequeño al final del documento [9, 12] -->
    <p class="secreto">Cesar sabe</p>

</body>
</html>
